apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycache
  namespace: caching
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycache
  template:
    metadata:
      labels:
        app: mycache
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: prepare-cache-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /cache/.tmp && chown -R 10001:10001 /cache"]
          volumeMounts:
            - name: cache
              mountPath: /cache
      containers:
        - name: mycache
          image: mycache:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: UPSTREAM_BASE_URL
              value: https://placehold.co
            - name: CACHE_DIR
              value: /cache
          volumeMounts:
            - name: cache
              mountPath: /cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: mycache-pvc
